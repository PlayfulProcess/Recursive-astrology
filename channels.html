<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Channels · The Recursive Astrology</title>
<meta name="description" content="Every grammar in the Recursive Astrology library as a channel — traditions, casting sequences, and the historiography — each linking to its live channel on recursive.eco.">
<link rel="stylesheet" href="theme.css">
<style>
  /* channels.html — the lightweight static echo of recursive.eco's channels UI.
     Pattern source: recursive-tarot/pages/channels.html (same convention as
     assistant.js — a header comment names the canon; adapt CHANNELS_CONFIG only).
     Data: _collection.json (scripts/build_collection.py) + ids.json. */
  *{box-sizing:border-box}
  main.wrap{max-width:1080px;margin:0 auto;padding:0 18px 60px}
  .hero{text-align:center;padding:30px 18px 10px;max-width:760px;margin:0 auto}
  .hero h1{font-family:var(--serif-display,Georgia);font-weight:600;font-size:clamp(30px,6vw,48px);margin:0}
  .hero h1 .gold{color:var(--gold,#9a7322)}
  .hero .tag{font-style:italic;color:var(--mut,#7a7060);margin:12px auto 0;max-width:56ch}
  .channel-cta{display:inline-flex;align-items:center;gap:8px;margin:18px auto 0;padding:10px 18px;border:1px solid var(--line-soft,#e3dccc);
    border-radius:999px;background:var(--surface,#fff);color:#7c3aed;font-weight:600;text-decoration:none;font-size:.95rem}
  .channel-cta:hover{border-color:#9333ea;background:rgba(147,51,234,.06)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;margin-top:28px}
  .chan{display:flex;flex-direction:column;background:var(--surface,#fff);border:1px solid var(--line-soft,#e3dccc);
    border-radius:12px;padding:16px;transition:transform .15s,border-color .15s}
  .chan:hover{transform:translateY(-2px);border-color:var(--gold,#9a7322)}
  .chan h3{margin:0 0 4px;font-size:1.02rem;line-height:1.35;font-family:var(--serif-display,Georgia)}
  .chan .desc{font-size:.85rem;color:var(--mut,#7a7060);line-height:1.5;flex:1}
  .chan .meta{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
  .pill{font-size:.72rem;padding:2px 9px;border-radius:999px;border:1px solid var(--line-soft,#e3dccc);color:var(--ink-soft,#5a5244);background:var(--bg,#faf8f3)}
  .chan .actions{display:flex;gap:10px;font-size:.85rem;border-top:1px solid var(--line-soft,#e3dccc);padding-top:10px}
  .chan .actions a{text-decoration:none;font-weight:600}
  .chan .actions .read{color:var(--ink,#2b2620)}
  .chan .actions .read:hover{color:var(--gold,#9a7322)}
  .chan .actions .eco{color:#7c3aed;margin-left:auto}
  .chan .actions .unpub{color:var(--mut,#7a7060);margin-left:auto;font-weight:400;font-size:.78rem;font-style:italic}
  .loading{text-align:center;color:var(--mut,#7a7060);padding:60px 0;font-style:italic}
</style>
</head>
<body>
<main class="wrap">
  <div class="hero">
    <h1>The <span class="gold">Channels</span></h1>
    <p class="tag">Every grammar in this library — the traditions, the casting sequences, the historiography —
      as a channel. Read the sky to know yourself, not to be told your fate.</p>
    <a class="channel-cta" href="https://flow.recursive.eco/library/channels/astrology" target="_blank" rel="noopener">
      Open this channel in recursive.eco ↗
    </a>
  </div>
  <div id="root"><p class="loading">Loading the library…</p></div>
</main>

<script>
(async function () {
  const CHANNELS_CONFIG = {
    collection: '_collection.json',
    ecoIds: 'ids.json',
    readerUrl: slug => 'index.html?grammar=' + encodeURIComponent(slug),
    appChannel: 'https://flow.recursive.eco/library/channels/astrology',
    appDeckUrl: uuid => 'https://flow.recursive.eco/?deckId=' + uuid,
  };
  const root = document.getElementById('root');
  let col, eco;
  try {
    [col, eco] = await Promise.all([
      fetch(CHANNELS_CONFIG.collection).then(r => r.json()),
      fetch(CHANNELS_CONFIG.ecoIds).then(r => r.json()).catch(() => ({ ids: {}, _public_now: [] })),
    ]);
  } catch (e) { root.innerHTML = '<p class="loading">Could not load the collection index.</p>'; return; }
  const ids = eco.ids || {}, pub = new Set(eco._public_now || []);
  const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  root.innerHTML = '<div class="cards">' + (col.grammars || []).map(g => {
    const uuid = ids[g.slug];
    const app = uuid && pub.has(g.slug)
      ? '<a class="eco" href="' + esc(CHANNELS_CONFIG.appDeckUrl(uuid)) + '" target="_blank" rel="noopener">recursive.eco ↗</a>'
      : '<span class="unpub">not yet published</span>';
    const cats = Object.entries(g.categories || {}).map(([c, n]) => '<span class="pill">' + n + ' ' + esc(c) + (n > 1 ? 's' : '') + '</span>').join('');
    return '<article class="chan"><h3>' + esc(g.name) + '</h3>' +
      '<p class="desc">' + esc(g.description) + '</p>' +
      '<div class="meta"><span class="pill">' + g.items + ' items</span>' + cats + '</div>' +
      '<div class="actions"><a class="read" href="' + esc(CHANNELS_CONFIG.readerUrl(g.slug)) + '">Read here →</a>' + app + '</div></article>';
  }).join('') + '</div>';
})();
</script>
</body>
</html>
